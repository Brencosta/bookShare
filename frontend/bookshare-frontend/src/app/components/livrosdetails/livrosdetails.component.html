<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-lg">
        <div class="card-body p-4">

          <h3 class="mb-4 text-center">Cadastro de Livro</h3>

          <div class="mb-3">
            <label class="form-label">Título</label>
            <input 
              type="text"
              name="titulo"
              class="form-control"
              [(ngModel)]="livro.titulo">
          </div>
          <div class="mb-3">
            <label class="form-label">Autor</label>
            <input 
              type="text"
              name="autor"
              class="form-control"
              [(ngModel)]="livro.autor">
          </div>
          <div class="mb-3">
            <label class="form-label">Gênero</label>
            <input 
              type="text"
              name="genero"
              class="form-control"
              [(ngModel)]="livro.genero">
          </div>
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea 
              name="descricao"
              class="form-control"
              rows="3"
              [(ngModel)]="livro.descricao">
            </textarea>
          </div>

          <hr>

          <div class="d-flex justify-content-between">

            <div>
              <button class="btn btn-success me-2" (click)="save()">
                Salvar
              </button>

              <button class="btn btn-warning me-2" (click)="save()">
                Editar
              </button>

              <button class="btn btn-danger" (click)="delete()">
                Excluir
              </button>
            </div>

            <div class="text-muted small align-self-center">
              Status: {{ livro.id ? 'Salvo no banco' : 'Não salvo no banco' }}
            </div>

          </div>

        </div>
      </div>

    </div>
  </div>
</div>
