<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Gênero</th>
      <th>Título</th>
      <th>Autor</th>
    </tr>
  </thead>
  <tbody>
    @for (livro of lista; track $index) {
      <tr>
       
        <td>{{ livro.genero }}</td>
        <td>{{ livro.titulo }}</td>
        <td>{{ livro.autor }}</td>
      </tr>
    }
  </tbody>
