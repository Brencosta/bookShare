<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-12">

      <div class="card shadow">
        <div class="card-body p-4">

          <table class="table table-striped table-bordered">
            
            <thead class="table-aquamarine">
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Categoria</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let livro of lista">
                <td>{{ livro.id }}</td>
                <td>{{ livro.titulo }}</td>
                <td>{{ livro.autor }}</td>
                <td>{{ livro.categoria }}</td>
                 <button class="btn btn-primary" mdbripple routerLink="livros/edit/{{ livro.id }}">editar </button>
              </tr>
            </tbody>


          </table>

        </div>
      </div>
