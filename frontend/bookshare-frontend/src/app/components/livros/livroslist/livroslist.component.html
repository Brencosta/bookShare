<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-12">

      <div class="card shadow">
        <div class="card-body p-4">
             <h3>Listahem de livros</h3>
            <div class="direita">
             <button class="btn btn-primary" mdbripple routerLink="/admin/livros/new">novo </button>           
</div>

 <br>

          <table class="table table-striped table-bordered">
           
            
            <thead class="table-aquamarine">
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Descrição</th>
              </tr>

              
            </thead>

            <tbody>
              <tr *ngFor="let livro of lista">
                <td>{{ livro.id }}</td>
                <td>{{ livro.titulo }}</td>
                <td>{{ livro.autor }}</td>
                <td>{{ livro.descricao }}</td>
                <td class="direita">
                    <td class="direita">
  <button 
    class="btn btn-primary me-2"
    [routerLink]="['/admin/livros/edit', livro.id]">
    Editar
  </button>

  <button 
    class="btn btn-danger"
    (click)="deleteLivro(livro.id)">
    Excluir
  </button>
</td>
                
                 
              </tr>
            </tbody>


          </table>

        </div>
      </div>
